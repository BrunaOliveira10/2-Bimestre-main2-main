<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laços de Repetição</title>
</head>
<body>

    <h2>While</h2>
    <p id="while"></p>

    <h2>For</h2>
    <p id="for"></p>

    <h2>Tabuada</h2>
    <p id="tab"></p>

<script>
    // Laço While
    let contador = 1;
    let textoWhile = "";

    while(contador <= 5){
        textoWhile += "O número é: " + contador + "<br>";
        contador++;
    }

    document.getElementById("while").innerHTML = textoWhile;

    // Laço For
    let textoFor = "";

    for(let cont = 1; cont <= 10; cont++){
        textoFor += "O número é: " + cont + "<br>";
    }

    document.getElementById("for").innerHTML = textoFor;

    // Tabuada do 5
    let res = "";
    for(let cont = 0; cont <= 10; cont++){
        res += "5 x " + cont + " = " + (5 * cont) + "<br>";
    }

    document.getElementById("tab").innerHTML = res;

</script>

</body>
</html>
